# Render Blueprint — one-click deploy. Render auto-provides $PORT.
services:
  - type: web
    name: queuestorm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 30
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
